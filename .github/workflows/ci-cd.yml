# ===========================================================================
# GITHUB ACTIONS — Java Application CI (VERSION FINALE)
# Rôle : UNIQUEMENT CI — Build, Tests, Sanity Check Docker
#
# ⚠️  TOUTES les briques sécurité (Gitleaks, Trivy, SonarQube, SBOM,
#     ZAP, Nuclei, OPA) restent sur JENKINS — ce fichier n'en fait AUCUNE.
#
# Corrections appliquées :
#   [P1] ✅ Service MySQL déclaré → l'app ne crashe plus au démarrage
#   [P1] ✅ Tests via "mvn verify" (fix JaCoCo — "jacoco:report" seul = erreur)
#   [P1] ✅ Health check HTTP réel sur /actuator/health (fini le sleep 15)
#   [P2] ✅ --network host sur le conteneur → accès au MySQL du service GHA
#   [P2] ✅ Nettoyage systématique (if: always())
#
# PRÉ-REQUIS pom.xml — le plugin JaCoCo doit être déclaré :
#   <plugin>
#     <groupId>org.jacoco</groupId>
#     <artifactId>jacoco-maven-plugin</artifactId>
#     <version>0.8.12</version>
#     <executions>
#       <execution><id>prepare-agent</id><goals><goal>prepare-agent</goal></goals></execution>
#       <execution><id>report</id><phase>verify</phase><goals><goal>report</goal></goals></execution>
#     </executions>
#   </plugin>
# ===========================================================================

name: Java Application CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test Spring Boot App
    runs-on: ubuntu-latest

    # ── Service MySQL ────────────────────────────────────────────────────────
    # [FIX] Ajout du service MySQL — était absent, l'app crashait au démarrage
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: archivage_db
          MYSQL_USER: archivage_user
          MYSQL_PASSWORD: archivage_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u archivage_user -parchivage_pass --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── JDK ─────────────────────────────────────────────────────────────────
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── Tests unitaires + JaCoCo ─────────────────────────────────────────────
      # [FIX] "mvn verify" au lieu de "mvn test jacoco:report"
      #   → "jacoco:report" seul échoue si le plugin n'est pas dans les groupIds Maven
      #   → "verify" exécute automatiquement : prepare-agent → test → report
      #   (nécessite que jacoco-maven-plugin soit déclaré dans pom.xml)
      - name: 🧪 Tests unitaires + Couverture JaCoCo
        run: mvn -B verify
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/archivage_db
          SPRING_DATASOURCE_USERNAME: archivage_user
          SPRING_DATASOURCE_PASSWORD: archivage_pass

      # ── Publication des résultats ────────────────────────────────────────────
      - name: 📊 Publication des résultats de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-results
          path: |
            target/surefire-reports/*.xml
            target/site/jacoco/

      # ── Build JAR ────────────────────────────────────────────────────────────
      # -DskipTests : les tests ont déjà tourné au-dessus, pas besoin de les relancer
      - name: 🔨 Build JAR (Maven package)
        run: mvn -B clean package -DskipTests

      # ── Build Image Docker ───────────────────────────────────────────────────
      - name: 🐳 Build image Docker
        run: docker build -t archivage-app:${{ github.sha }} .

      # ── Sanity Check ─────────────────────────────────────────────────────────
      # [FIX] --network host → le conteneur atteint le MySQL du service GHA
      # [FIX] Boucle curl sur /actuator/health (plus de sleep 15 aveugle)
      - name: 🚀 Sanity Check — démarrage de l'application
        run: |
          docker run -d --name archivage-app \
            --network host \
            -e SPRING_DATASOURCE_URL=jdbc:mysql://127.0.0.1:3306/archivage_db \
            -e SPRING_DATASOURCE_USERNAME=archivage_user \
            -e SPRING_DATASOURCE_PASSWORD=archivage_pass \
            archivage-app:${{ github.sha }}

          echo "⏳ Attente du démarrage de Spring Boot..."
          READY=0
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8080/actuator/health 2>/dev/null || echo "000")
            if echo "${STATUS}" | grep -qE "^(200|302)$"; then
              echo "✅ Application disponible (HTTP ${STATUS}) — tentative ${i}/24"
              READY=1
              break
            fi
            echo "  ⏳ Tentative ${i}/24 — HTTP ${STATUS}"
            sleep 5
          done

          if [ "${READY}" -ne 1 ]; then
            echo "❌ Timeout — Application non disponible après 120s"
            docker logs archivage-app --tail 80
            exit 1
          fi

      # ── Nettoyage ────────────────────────────────────────────────────────────
      - name: 🧹 Nettoyage
        if: always()
        run: |
          docker rm -f archivage-app 2>/dev/null || true
          docker rmi archivage-app:${{ github.sha }} 2>/dev/null || true
