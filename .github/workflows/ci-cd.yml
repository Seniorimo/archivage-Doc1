name: Java Application CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-run:
    name: Build & Test Spring Boot App
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Build with Maven
        run: mvn -B clean install -DskipTests

      - name: 🐳 Build Docker Image
        run: docker build -t archivage-app:latest .

      - name: 🚀 Run Application (Sanity Check)
        run: |
          # Lancement de l'application en arrière-plan
          docker run -d --name my-spring-app -p 8080:8080 archivage-app:latest
          
          echo "⏳ Attente du démarrage de Spring Boot..."
          sleep 15
          
          # Affichage des logs pour vérification manuelle
          docker logs my-spring-app
