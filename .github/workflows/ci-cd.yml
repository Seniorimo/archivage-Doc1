name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 👇 مهم (حل مشكل permission)
      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean compile -B --no-transfer-progress

      # ✅ Install Trivy (بدل action)
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.49.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.49.1_Linux-64bit.deb

      # ✅ Scan المشروع ديالك
      - name: Run Trivy Scan
        run: trivy fs . --format table --severity HIGH,CRITICAL || true

      # ✅ Generate HTML Report
      - name: Generate Trivy HTML Report
        run: |
          trivy fs . --format template --template "@/usr/local/share/trivy/templates/html.tpl" -o trivy-report.html || true

      - name: Archive Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.html
