name: Fast CI & Sanity Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-run:
    name: Build & Test Spring Boot App
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Optimisation : Utilisation de -T 1C pour exploiter tous les cœurs du runner GitHub
      - name: ⚡ Build with Maven
        run: mvn -B -T 1C clean package -DskipTests

      - name: 🐳 Build Docker Image
        run: docker build -t archivage-app:latest .

      # Optimisation : Remplacement du 'sleep' aveugle par un vrai script de Healthcheck
      - name: 🚀 Run Application & Healthcheck
        run: |
          docker run -d --name my-spring-app -p 8080:8080 archivage-app:latest
          
          echo "⏳ Attente du démarrage de Spring Boot (Healthcheck)..."
          READY=0
          
          # Boucle de vérification dynamique (Max 60 secondes)
          for i in {1..12}; do
            # On test si le port 8080 répond (même avec une erreur 401/403, ça prouve que le serveur tourne)
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ | grep -qE "200|302|401|403|404"; then
              echo "✅ Application démarrée et accessible !"
              READY=1
              break
            fi
            sleep 5
          done

          # Si après 60s READY est toujours à 0, on affiche les logs et on force l'échec du job
          if [ "$READY" -ne 1 ]; then
            echo "❌ L'application n'a pas démarré correctement. Affichage des logs :"
            docker logs my-spring-app
            exit 1
          fi
