name: Fast CI & Security Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test Spring Boot App
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: ⚡ Build with Maven (Multithreaded)
        run: mvn -B -T 1C clean package -DskipTests --no-transfer-progress

      - name: 🐳 Build Docker Image
        env:
          DOCKER_BUILDKIT: 1
        run: docker build --progress=auto -t archivage-app:latest .

      - name: 🛡️ Shift-Left Security (Trivy Scan)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'archivage-app:latest'
          format: 'table'
          exit-code: '0' # Mettre à '1' plus tard si vous voulez bloquer les PR vulnérables
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: 🚀 Run Application & Healthcheck
        run: |
          docker run -d --name my-spring-app -p 8080:8080 archivage-app:latest
          
          echo "⏳ Attente du démarrage de Spring Boot (Healthcheck)..."
          READY=0
          
          for i in {1..12}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ | grep -qE "200|302|401|403|404"; then
              echo "✅ Application démarrée et accessible !"
              READY=1
              break
            fi
            sleep 5
          done

          if [ "$READY" -ne 1 ]; then
            echo "❌ L'application n'a pas démarré correctement. Affichage des logs :"
            docker logs my-spring-app
            exit 1
          fi
