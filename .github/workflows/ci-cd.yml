# ===========================================================================
# GITHUB ACTIONS — Java Application CI (VERSION FINALE)
# Rôle : UNIQUEMENT CI — Build, Tests, Sanity Check Docker
#
# ⚠️  TOUTES les briques sécurité restent sur JENKINS.
#
# Fixes appliqués :
#   ✅ Service MySQL pour mvn verify (tests unitaires avec BDD)
#   ✅ Profil "docker" activé pour le sanity check → MySQL + port 8090
#   ✅ Health check sur port 8090 (aligné avec application-docker.properties)
#   ✅ Volume /tmp/archivage-uploads monté → fix AccessDeniedException uploads
#   ✅ Secrets via GitHub Secrets (DB_PASSWORD, GITHUB_OAUTH_SECRET, JWT_SECRET)
#
# SECRETS GITHUB À CONFIGURER (Settings > Secrets > Actions) :
#   DB_PASSWORD          → mot de passe MySQL de test
#   GITHUB_OAUTH_SECRET  → client-secret GitHub OAuth
#   JWT_SECRET           → secret JWT de l'application
# ===========================================================================

name: Java Application CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build & Test Spring Boot App
    runs-on: ubuntu-latest

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: archivage_doc
      DB_USER: archivage_user

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: archivage_doc
          MYSQL_USER: archivage_user
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u archivage_user -p${{ secrets.DB_PASSWORD }} --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: 🧪 Tests unitaires + Couverture JaCoCo
        run: mvn -B verify
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/archivage_doc?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
          SPRING_DATASOURCE_USERNAME: archivage_user
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GITHUB_OAUTH_SECRET: ${{ secrets.GITHUB_OAUTH_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: 📊 Publication des résultats de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-results
          path: |
            target/surefire-reports/*.xml
            target/site/jacoco/

      - name: 🔨 Build JAR (Maven package)
        run: mvn -B clean package -DskipTests

      - name: 🐳 Build image Docker
        run: docker build -t archivage-app:${{ github.sha }} .

      - name: 🚀 Sanity Check — démarrage de l'application
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/archivage_doc?useUnicode=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: archivage_user
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GITHUB_OAUTH_SECRET: ${{ secrets.GITHUB_OAUTH_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -eu

          mkdir -p /tmp/archivage-uploads

          docker run -d --name archivage-app \
            --network host \
            -v /tmp/archivage-uploads:/app/uploads \
            -e SPRING_PROFILES_ACTIVE=docker \
            -e SPRING_DATASOURCE_URL="${SPRING_DATASOURCE_URL}" \
            -e SPRING_DATASOURCE_USERNAME="${SPRING_DATASOURCE_USERNAME}" \
            -e SPRING_DATASOURCE_PASSWORD="${SPRING_DATASOURCE_PASSWORD}" \
            -e GITHUB_OAUTH_SECRET="${GITHUB_OAUTH_SECRET}" \
            -e JWT_SECRET="${JWT_SECRET}" \
            archivage-app:${{ github.sha }}

          echo "⏳ Attente du démarrage de Spring Boot..."
          READY=0

          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8090/actuator/health 2>/dev/null || echo "000")

            if echo "${STATUS}" | grep -qE "^(200|302|401|403)$"; then
              echo "✅ Application disponible (HTTP ${STATUS})"
              READY=1
              break
            fi

            echo "⏳ Tentative ${i}/24 — HTTP ${STATUS}"

            if [ $((i % 5)) -eq 0 ]; then
              echo "--- Docker logs (tentative ${i}) ---"
              docker logs archivage-app --tail 20 2>&1 || true
              echo "---"
            fi

            sleep 5
          done

          if [ "${READY}" -ne 1 ]; then
            echo "❌ Timeout — logs complets :"
            docker logs archivage-app 2>&1 || true
            exit 1
          fi

      - name: 🧹 Nettoyage
        if: always()
        run: |
          docker rm -f archivage-app 2>/dev/null || true
          docker rmi archivage-app:${{ github.sha }} 2>/dev/null || true
