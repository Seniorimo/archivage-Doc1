# ===========================================================================
# APPLICATION.PROPERTIES — Environnement LOCAL (développement)
# Fix appliqué :
#   ✅ Secrets migrés vers variables d'environnement (${VAR:default})
#   ✅ server.port=8090 conservé pour le dev local
# ===========================================================================

spring.application.name=archivage-Doc

server.port=8090

# ── Base de données MySQL ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/archivage_doc?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC&readOnly=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── OAuth2 Resource Server (JWT) ──────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://issuer.com

# ── OAuth2 Client GitHub ──────────────────────────────────────────────────
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:Ov23liNCDMJ68esiHnqh}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_OAUTH_SECRET}
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:8090/login/oauth2/code/github
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user

# ── JWT ───────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:***REMOVED***}
jwt.expiration=86400000

# ── Stockage fichiers ─────────────────────────────────────────────────────
file.upload-dir=./uploads

# ── Multipart ─────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=250MB
spring.servlet.multipart.max-request-size=250MB

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.configUrl=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs
springdoc.packagesToScan=com.example.archivage_Doc
springdoc.pathsToMatch=/api/**

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
