# ===========================================================================
# PROFIL DOCKER / CI — remplace application.properties en environnement conteneur
# Fixes :
#   ✅ server.port=8080 (au lieu de 8090) — correspond au EXPOSE Dockerfile
#   ✅ H2 in-memory (pas besoin de MySQL externe)
#   ✅ OAuth2 issuer-uri vide → empêche l'appel réseau à https://issuer.com
#   ✅ OAuth2 GitHub désactivé (pas de redirect possible en CI)
# ===========================================================================

spring.application.name=archivage-Doc

# Fix port : 8090 → 8080 pour correspondre au EXPOSE du Dockerfile
server.port=8080

# ── Base de données H2 in-memory (remplace MySQL) ──────────────────────────
spring.datasource.url=jdbc:h2:mem:archivage_doc;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Fix OAuth2 Resource Server ────────────────────────────────────────────
# issuer-uri vide = pas de tentative OIDC discovery au démarrage
# (https://issuer.com n'est pas joignable → Spring Boot crashait)
spring.security.oauth2.resourceserver.jwt.issuer-uri=

# ── Fix OAuth2 Client GitHub ──────────────────────────────────────────────
# Désactivé en CI (pas de redirect OAuth2 possible dans un pipeline)
spring.security.oauth2.client.registration.github.client-id=
spring.security.oauth2.client.registration.github.client-secret=

# ── Stockage fichiers ─────────────────────────────────────────────────────
file.upload-dir=./uploads

# ── JWT (clé statique pour CI) ────────────────────────────────────────────
jwt.secret=***REMOVED***
jwt.expiration=86400000

# ── Multipart ─────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Swagger ───────────────────────────────────────────────────────────────
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
