# ===========================================================================
# PROFIL DOCKER / CI / JENKINS — MySQL + port 8090
# ===========================================================================

spring.application.name=archivage-Doc

server.port=8090

# ── Base de données MySQL ─────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:3306/archivage_doc?useUnicode=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:archivage_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:archivage_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── OAuth2 Client GitHub — DUMMY pour CI (clientId ne peut pas être vide) ──
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:ci-dummy-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_OAUTH_SECRET:ci-dummy-client-secret}
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:8090/login/oauth2/code/github
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user

# ── JWT ───────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:***REMOVED***}
jwt.expiration=86400000

# ── Stockage fichiers ─────────────────────────────────────────────────────
file.upload-dir=/app/uploads

# ── Multipart ─────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=250MB
spring.servlet.multipart.max-request-size=250MB

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.oauth2=WARN
