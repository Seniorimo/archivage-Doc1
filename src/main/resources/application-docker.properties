# ===========================================================================
# PROFIL DOCKER / CI — remplace application.properties en environnement conteneur
# Fixes :
#   ✅ server.port=8080 (au lieu de 8090) — correspond au EXPOSE Dockerfile
#   ✅ H2 in-memory (pas besoin de MySQL externe)
#   ✅ OAuth2 issuer-uri désactivé → empêche l'appel réseau à https://issuer.com
#   ✅ OAuth2 GitHub → valeurs DUMMY non-vides (fix "clientId cannot be empty")
#      Le vrai OAuth2 n'est pas testé en CI (pas de callback HTTP possible)
# ===========================================================================

spring.application.name=archivage-Doc

# ── Port ──────────────────────────────────────────────────────────────────
# Fix : 8090 → 8080 pour correspondre au EXPOSE du Dockerfile
server.port=8080

# ── Base de données H2 in-memory (remplace MySQL) ─────────────────────────
spring.datasource.url=jdbc:h2:mem:archivage_doc;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── OAuth2 Resource Server ────────────────────────────────────────────────
# issuer-uri commenté = Spring ne tente PAS de joindre https://issuer.com au démarrage
# (une valeur vide "" déclenche quand même l'auto-configuration → on la supprime)
# spring.security.oauth2.resourceserver.jwt.issuer-uri=

# ── OAuth2 Client GitHub — DUMMY non-vides ───────────────────────────────
# Fix "clientId cannot be empty" dans SecurityConfig.githubClientRegistration()
# Ces valeurs sont fictives : elles satisfont la validation Spring sans activer
# un vrai flux OAuth2 (impossible en CI — pas de redirect HTTP)
spring.security.oauth2.client.registration.github.client-id=ci-dummy-client-id
spring.security.oauth2.client.registration.github.client-secret=ci-dummy-client-secret
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:8080/login/oauth2/code/github
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user

# ── JWT ───────────────────────────────────────────────────────────────────
jwt.secret=***REMOVED***
jwt.expiration=86400000

# ── Stockage fichiers ─────────────────────────────────────────────────────
file.upload-dir=/app/uploads

# ── Multipart ─────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ── Logging (réduit en CI) ────────────────────────────────────────────────
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.oauth2=WARN
